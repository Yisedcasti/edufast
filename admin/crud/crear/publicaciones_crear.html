    <h1>Subir imagenes e informaciòn </h1>
    

        <form action="#" method="post">

            <div class="EstiloImagen"><input class="Imagen-uno" type="file" name="imagen"  ></div>

            <div class="btn1"><input  type="submit" value="enviar"></div>
            </div>
            <div class="info">
                <h2> Sube informaciòn</h2>
                <textarea name="informacion" id="" cols="40" rows="9"></textarea>
                <div class="btn2"><input  type="submit" value="enviar"></div>
            </div>

        </form>
