<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <title>Tabla de Citas</title>
</head>
<body>
    <header>
        <div class="logo">
            <span><h2>EDUFAST</h2></span>
            <img src="../imagenes/logo.png" alt="logo" title="logo">
        </div>
        <nav>
            <ul>
                <li><a href="Citas.html" title="Volver a pagina principal">Volver</a></li>
                <li><a href="Citasactualizar.html" title="Ir a actualizar citas ">Actualizar</a></li>
                <li><a href="Citaseliminar.html" title="Ir a eliminar citas">Eliminar</a></li>
            </ul>
        </nav>
    </header>
    <h1 align="center">Tabla de Citas</h1>
    <table border="8px">
        <thead>
            <tr>
                <th>Fecha</th>
                <th>Hora</th>
                <th>Motivo</th>
                <th>Quién Cita</th>
                <th>Ocupación</th>
                <th>Citado</th>
                <th>Accion</th>
            </tr>
        </thead>
        <tbody>
            <!-- Ejemplo de una cita -->
            <tr>
                <td>2024-05-20</td>
                <td>10:00 a.m</td>
                <td>Reunion de padres</td>
                <td>Juan Pérez</td>
                <td>Coordinador</td>
                <td>José González</td>
                <td><button>Crear</button></td>
            </tr>
            <!-- Puedes añadir más citas aquí -->
        </tbody>
        <tbody>
            <!-- Ejemplo de una cita -->
            <tr>
                <td>2024-05-20</td>
                <td>10:00</td>
                <td>Reunión de Padres y Maestros</td>
                <td>Profesor(a) María Rodríguez</td>
                <td>Docente</td>
                <td>Juan Pérez</td>
                <td><button>Crear</button></td>
            </tr>
            <!-- Puedes añadir más citas aquí -->
    </table>
</body>
</html>
