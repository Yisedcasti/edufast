<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="../css/inicio2.css">
    <title>Modern Login Page | AsmrProg</title>
</head>

<body>

    <header>
        <div class="logo">
            <SPan><H2>EDUFAST</H2></SPan>
            <img src="../imagenes/logo.png">
    
        </div>
    <nav>
        <ul>
            <li><a href="index.html">Inicio</a></li>
            </ul>
    </nav>

</header>
    

    <div class="container" id="container">
        <div class="form-container sign-in">
            <form method="post" action="pag_principal.html">
                <h1>Sign In</h1>
                <div class="social-icons">
                    <a href="#" class="icon"><i class="fa-brands fa-google-plus-g"></i></a>
                    <a href="#" class="icon"><i class="fa-brands fa-facebook-f"></i></a>
                </div>
                <span>or use your email password</span>
                <input type="text" placeholder="User Name" required>
                <input type="email" placeholder="Email" required>
                <input type="password" placeholder="Password" required>
                <button><input type="submit"></button>
            </form>
        </div>
        <div class="toggle-container">
            <div class="toggle">
                <div class="toggle-panel toggle-left">
                    <h1>Welcome!</h1>
                    <p>Enter your personal details to use all of site features</p>
                    <b>                 
                  <button  class="hidden" id="login">Sign in</button>
                </div>
                <div class="toggle-panel toggle-right">
                    <h1>Hola usuario</h1>
                    <p>You have not yet registered?, enter with your personal data to use all the functions of the educational web site</p>
                </div>
            </div>
        </div>
    </div>

    <script src="../java/script"></script>
</body>

</html>
